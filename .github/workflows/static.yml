name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  delete:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Build preview target path
        if: github.event_name == 'pull_request'
        id: preview-path
        uses: ./.github/actions/preview-path
        with:
          branch-name: ${{ github.event.pull_request.head.ref }}
      - name: Deploy main site to root
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: true
      - name: Deploy PR preview under /test/<branch-name>
        # Fork PRs do not get previews because the workflow token cannot safely push gh-pages.
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: ${{ steps.preview-path.outputs.path }}
          keep_files: true

  cleanup-preview:
    if: >
      (github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'delete' &&
      github.event.ref_type == 'branch' &&
      github.event.repository.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve branch name
        id: branch-name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.ref }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build preview target path
        id: preview-path
        uses: ./.github/actions/preview-path
        with:
          branch-name: ${{ steps.branch-name.outputs.value }}
      - name: Checkout gh-pages
        id: checkout-pages
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
      - name: Remove preview path
        if: steps.checkout-pages.outcome == 'success'
        env:
          TARGET_PATH: ${{ steps.preview-path.outputs.path }}
        run: |
          cd gh-pages
          if [ ! -d "$TARGET_PATH" ]; then
            echo "No preview folder to remove: $TARGET_PATH"
            exit 0
          fi

          rm -rf "$TARGET_PATH"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No cleanup changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Cleanup preview $TARGET_PATH"
          git push origin HEAD:gh-pages
